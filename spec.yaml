id: dnbr_burn_severity

requirements:
  - name: "ecoscope-platform"
    version: ">=2.15.0,<2.16.0"
    channel: "https://repo.prefix.dev/ecoscope-workflows/"
  - name: pydeck
    version: "0.9.2"
  - name: "dnbr-severity-tasks"
    path: "/home/sam/Ecoscope_Projects/dnbr-severity-tasks"
    editable: true

rjsf-overrides:
  properties:
    aoi_name.properties.group_name.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: spatial_feature_group
          depends_on: properties.er_connection.properties.data_source.properties.name
    overlay_name.properties.group_name.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: spatial_feature_group
          depends_on: properties.er_connection.properties.data_source.properties.name

workflow:

  # --- Metadata ---------------------------------------------------------------
  - name: Workflow Details
    id: workflow_details
    task: set_workflow_details

  # --- Connections ------------------------------------------------------------
  - name: EarthRanger
    id: er_connection
    task: set_er_connection

  - name: Earth Engine
    id: gee_connection
    task: set_gee_connection

  # --- Area of interest (required) --------------------------------------------
  - name: Area of Interest
    id: aoi_name
    task: set_aoi_group_name

  - name: AOI Features
    id: aoi_features
    task: get_spatial_features_group
    partial:
      client: ${{ workflow.er_connection.return }}
      spatial_features_group_name: ${{ workflow.aoi_name.return }}

  # --- Optional overlay -------------------------------------------------------
  - name: Overlay Layer Group Name
    id: overlay_name
    task: set_overlay_group_name

  - name: Overlay Features
    id: overlay_features
    task: get_spatial_features_group
    skipif:
      conditions:
        - any_dependency_is_empty_string
    partial:
      client: ${{ workflow.er_connection.return }}
      spatial_features_group_name: ${{ workflow.overlay_name.return }}

  # --- Base maps --------------------------------------------------------------
  - name: Base Maps
    id: base_maps
    task: set_base_maps

  # --- Fire window (own steps so the dates can be reused by the ER event ------
  # overlays below, not just the dNBR computation) ------------------------------
  - name: Fire Start Date
    id: fire_start_date
    task: set_fire_start_date

  - name: Fire End Date
    id: fire_end_date
    task: set_fire_end_date

  - name: Fire Start Datetime
    id: fire_start_dt
    task: parse_fire_start_datetime
    partial:
      fire_start_date: ${{ workflow.fire_start_date.return }}

  - name: Fire End Datetime
    id: fire_end_dt
    task: parse_fire_end_datetime
    partial:
      fire_end_date: ${{ workflow.fire_end_date.return }}

  - name: Fire Time Range
    id: fire_time_range
    task: set_time_range
    partial:
      since: ${{ workflow.fire_start_dt.return }}
      until: ${{ workflow.fire_end_dt.return }}

  # --- Optional: Controlled Burn events (visual reference only) ---------------
  - name: Controlled Burn Event Type
    id: controlled_burn_event_type
    task: set_controlled_burn_event_type

  - name: Controlled Burn Events
    id: controlled_burn_events
    task: get_events
    skipif:
      conditions:
        - any_dependency_is_empty_string
    partial:
      client: ${{ workflow.er_connection.return }}
      time_range: ${{ workflow.fire_time_range.return }}
      event_types:
        - ${{ workflow.controlled_burn_event_type.return }}
      raise_on_empty: false

  - name: Controlled Burn Layer
    id: controlled_burn_layer
    task: create_styled_overlay_layer
    skipif:
      conditions:
        - any_dependency_skipped
        - any_is_empty_df
    partial:
      geodataframe: ${{ workflow.controlled_burn_events.return }}
      zoom: false
      color: "#1E90FF"

  # --- Optional: FIRMS detections (visual reference only) ----------------------
  - name: FIRMS Event Type
    id: firms_event_type
    task: set_firms_event_type

  - name: FIRMS Events
    id: firms_events
    task: get_events
    skipif:
      conditions:
        - any_dependency_is_empty_string
    partial:
      client: ${{ workflow.er_connection.return }}
      time_range: ${{ workflow.fire_time_range.return }}
      event_types:
        - ${{ workflow.firms_event_type.return }}
      raise_on_empty: false

  - name: FIRMS Layer
    id: firms_layer
    task: create_styled_overlay_layer
    skipif:
      conditions:
        - any_dependency_skipped
        - any_is_empty_df
    partial:
      geodataframe: ${{ workflow.firms_events.return }}
      zoom: false
      color: "#FF00FF"

  # --- dNBR severity computation (GEE) ----------------------------------------
  - name: Compute Severity
    id: severity_result
    task: compute_dnbr_severity
    partial:
      client: ${{ workflow.gee_connection.return }}
      aoi: ${{ workflow.aoi_features.return }}
      fire_start_date: ${{ workflow.fire_start_date.return }}
      fire_end_date: ${{ workflow.fire_end_date.return }}

  # --- Severity polygon layer -------------------------------------------------
  - name: Severity Layer
    id: severity_layer
    task: create_dnbr_severity_layer
    partial:
      geodataframe: ${{ workflow.severity_result.return }}

  # --- AOI boundary outline (always shown, zoom target) -----------------------
  - name: AOI Boundary Layer
    id: aoi_layer
    task: create_styled_overlay_layer
    partial:
      geodataframe: ${{ workflow.aoi_features.return }}
      zoom: true

  # --- Optional user overlay --------------------------------------------------
  - name: Overlay Layer
    id: overlay_layer
    task: create_styled_overlay_layer
    skipif:
      conditions:
        - any_dependency_skipped
        - any_is_empty_df
    partial:
      geodataframe: ${{ workflow.overlay_features.return }}
      zoom: false

  # --- Combine layers: severity + AOI boundary + optional overlay -------------
  # skipif: any_is_empty_df ONLY — task handles SkipSentinel from overlay_layer
  # internally so the map renders even when no overlay was chosen.
  - name: Combined Layers
    id: combined_layers
    task: combine_severity_layers
    skipif:
      conditions:
        - any_is_empty_df
    partial:
      severity_layer: ${{ workflow.severity_layer.return }}
      aoi_layer: ${{ workflow.aoi_layer.return }}
      overlay_layer: ${{ workflow.overlay_layer.return }}
      controlled_burn_layer: ${{ workflow.controlled_burn_layer.return }}
      firms_layer: ${{ workflow.firms_layer.return }}

  # --- Severity map -----------------------------------------------------------
  - name: Severity Map
    id: severity_map
    task: draw_ecomap
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      title: null
      tile_layers: ${{ workflow.base_maps.return }}
      geo_layers: ${{ workflow.combined_layers.return }}
      north_arrow_style:
        placement: top-left
      legend_style:
        title: Burn Severity
        placement: bottom-right
      static: false
      max_zoom: 20

  - name: Persist Map
    id: severity_map_url
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: dnbr_severity
      text: ${{ workflow.severity_map.return }}

  - name: Map Widget
    id: map_widget
    task: create_map_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Burn Severity Map
      data: ${{ workflow.severity_map_url.return }}

  # --- GeoJSON export (Desktop Files tab) -------------------------------------
  - name: Severity GeoJSON
    id: severity_file
    task: persist_df
    partial:
      df: ${{ workflow.severity_result.return }}
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: geojson

  # --- Stat: burned area ------------------------------------------------------
  - name: Burned Area
    id: burned_area_ha
    task: count_burned_area_ha
    partial:
      geodataframe: ${{ workflow.severity_result.return }}

  - name: Burned Area Formatted
    id: burned_area_fmt
    task: format_area_ha
    partial:
      area_ha: ${{ workflow.burned_area_ha.return }}

  - name: Widget - Burned
    id: widget_burned
    task: create_text_widget_single_view
    partial:
      title: Burned
      data: ${{ workflow.burned_area_fmt.return }}

  # --- Stat: high severity area -----------------------------------------------
  - name: High Severity Area
    id: high_severity_ha
    task: count_high_severity_area_ha
    partial:
      geodataframe: ${{ workflow.severity_result.return }}

  - name: High Severity Formatted
    id: high_severity_fmt
    task: format_area_ha
    partial:
      area_ha: ${{ workflow.high_severity_ha.return }}

  - name: Widget - High Sev
    id: widget_high_severity
    task: create_text_widget_single_view
    partial:
      title: High Sev
      data: ${{ workflow.high_severity_fmt.return }}

  # --- Stat: % of AOI burned --------------------------------------------------
  - name: AOI Area
    id: aoi_area_result
    task: get_aoi_area_ha
    partial:
      geodataframe: ${{ workflow.severity_result.return }}

  - name: Percent Burned
    id: percent_burned
    task: get_percent_burned
    partial:
      burned_ha: ${{ workflow.burned_area_ha.return }}
      aoi_area_ha: ${{ workflow.aoi_area_result.return }}

  - name: Percent Burned Formatted
    id: percent_burned_fmt
    task: format_percent_burned
    partial:
      percent: ${{ workflow.percent_burned.return }}

  - name: Widget - % Burned
    id: widget_percent_burned
    task: create_text_widget_single_view
    partial:
      title: "% Burned"
      data: ${{ workflow.percent_burned_fmt.return }}

  # --- Stat: mean dNBR --------------------------------------------------------
  - name: Mean dNBR
    id: mean_dnbr
    task: count_mean_dnbr
    partial:
      geodataframe: ${{ workflow.severity_result.return }}

  - name: Mean dNBR Formatted
    id: mean_dnbr_fmt
    task: format_mean_dnbr
    partial:
      dnbr_value: ${{ workflow.mean_dnbr.return }}

  - name: Widget - Mean dNBR
    id: widget_mean_dnbr
    task: create_text_widget_single_view
    partial:
      title: Mean dNBR
      data: ${{ workflow.mean_dnbr_fmt.return }}

  # --- Stat: dNBR detection threshold used ------------------------------------
  - name: dNBR Threshold
    id: threshold_result
    task: get_dnbr_threshold
    partial:
      geodataframe: ${{ workflow.severity_result.return }}

  - name: dNBR Threshold Formatted
    id: threshold_fmt
    task: format_dnbr_threshold
    partial:
      threshold: ${{ workflow.threshold_result.return }}

  - name: Widget - Threshold
    id: widget_threshold
    task: create_text_widget_single_view
    partial:
      title: Threshold
      data: ${{ workflow.threshold_fmt.return }}

  # --- Stat: pre/post scene counts (trust indicators) -------------------------
  - name: Pre Scenes
    id: pre_scenes
    task: count_pre_images
    partial:
      geodataframe: ${{ workflow.severity_result.return }}

  - name: Pre Scenes Formatted
    id: pre_scenes_fmt
    task: format_image_count
    partial:
      count: ${{ workflow.pre_scenes.return }}

  - name: Widget - Pre Imgs
    id: widget_pre_scenes
    task: create_text_widget_single_view
    partial:
      title: Pre Imgs
      data: ${{ workflow.pre_scenes_fmt.return }}

  - name: Post Scenes
    id: post_scenes
    task: count_post_images
    partial:
      geodataframe: ${{ workflow.severity_result.return }}

  - name: Post Scenes Formatted
    id: post_scenes_fmt
    task: format_image_count
    partial:
      count: ${{ workflow.post_scenes.return }}

  - name: Widget - Post Imgs
    id: widget_post_scenes
    task: create_text_widget_single_view
    partial:
      title: Post Imgs
      data: ${{ workflow.post_scenes_fmt.return }}

  # --- Dashboard --------------------------------------------------------------
  # Row 1 (y=0): 0=Burned, 1=High Sev, 2=% Burned, 3=Threshold
  # Row 2 (y=3): 4=Mean dNBR, 5=Pre Imgs, 6=Post Imgs
  # Row 3 (y=6): 7=Map
  - name: Dashboard
    id: dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return }}
      widgets:
        - ${{ workflow.widget_burned.return }}
        - ${{ workflow.widget_high_severity.return }}
        - ${{ workflow.widget_percent_burned.return }}
        - ${{ workflow.widget_threshold.return }}
        - ${{ workflow.widget_mean_dnbr.return }}
        - ${{ workflow.widget_pre_scenes.return }}
        - ${{ workflow.widget_post_scenes.return }}
        - ${{ workflow.map_widget.return }}
      time_range: ~

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped
